<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shift Payment Calculator with Tax</title>

<style>
body { font-family: Arial, sans-serif; background: #f0f2f5; padding:20px; }
.container { max-width: 650px; margin:auto; background:#fff; padding:20px; border-radius:12px; box-shadow:0 6px 12px rgba(0,0,0,0.1); }
h1 { text-align:center; }
label { font-weight:bold; display:block; margin-top:10px; }
input { width:100%; padding:8px; margin-top:5px; border-radius:6px; border:1px solid #ccc; }
button { width:100%; padding:12px; margin-top:15px; background:#3498db; color:white; border:none; border-radius:6px; cursor:pointer; }
button:hover { background:#2980b9; }
.output { margin-top:20px; background:#ecf0f1; padding:15px; border-radius:10px; }
</style>
</head>

<body>
<p> Tax: 24.73, 30.9125, 37.095, Cash: 24, 30, 36 </p>
<h1>Shift Payment Calculator</h1>

<div class="container">

<h3>Pay Rates ($)</h3>

<label>Weekday (Tax):</label>
<input type="number" id="weekdayTax">

<label>Weekday (Cash):</label>
<input type="number" id="weekdayCash">

<label>Saturday (Tax):</label>
<input type="number" id="saturdayTax">

<label>Saturday (Cash):</label>
<input type="number" id="saturdayCash">

<label>Sunday (Tax):</label>
<input type="number" id="sundayTax">

<label>Sunday (Cash):</label>
<input type="number" id="sundayCash">

<h3>Number of Shifts</h3>

<label>Weekday:</label>
<input type="number" id="weekdayCount" oninput="generateInputs()">

<label>Saturday:</label>
<input type="number" id="saturdayCount" oninput="generateInputs()">

<label>Sunday:</label>
<input type="number" id="sundayCount" oninput="generateInputs()">

<div id="shiftInputs"></div>

<button onclick="calculatePay()">Calculate</button>

<div class="output" id="output"></div>

</div>

<script>

// Convert time to decimal
function parseTime(t){
  if(t.includes(':')){
    let [h,m]=t.split(':').map(Number);
    return h + (m||0)/60;
  }
  return Number(t);
}

// Calculate hours
function parseHours(val){
  if(!val.includes('-')) return 0;
  let [s,e]=val.split('-').map(v=>parseTime(v.trim()));
  if(isNaN(s)||isNaN(e)) return 0;
  if(e<s)[s,e]=[e,s];
  let h=e-s;
  if(h>5.5) h-=0.5;
  return h;
}
  
bot.sendMessage(chatId, "Open Calculator", {
  reply_markup: {
    inline_keyboard: [[
      {
        text: "Open App",
        web_app: { url: "https://github.com/KimChhorn123/Shift-Payment-Calculator" }
      }
    ]]
  }
});

// Generate dynamic shift inputs
function generateInputs(){
  let w=+weekdayCount.value||0;
  let s=+saturdayCount.value||0;
  let su=+sundayCount.value||0;
  let html='<h3>Enter Shifts</h3>';
  for(let i=1;i<=w;i++) html+=`<label>Weekday ${i}</label><input class="w" placeholder="8-14 or 8:30-13:00">`;
  for(let i=1;i<=s;i++) html+=`<label>Saturday ${i}</label><input class="sat" placeholder="8-14 or 8:30-13:00">`;
  for(let i=1;i<=su;i++) html+=`<label>Sunday ${i}</label><input class="sun" placeholder="8-14 or 8:30-13:00">`;
  shiftInputs.innerHTML=html;
}

// Main calculation
function calculatePay(){
  // Rates
  let wt=+weekdayTax.value||0;
  let wc=+weekdayCash.value||0;
  let st=+saturdayTax.value||0;
  let sc=+saturdayCash.value||0;
  let sut=+sundayTax.value||0;
  let suc=+sundayCash.value||0;

  // Hours
  let wH=0,sH=0,suH=0;
  document.querySelectorAll('.w').forEach(i=>wH+=parseHours(i.value));
  document.querySelectorAll('.sat').forEach(i=>sH+=parseHours(i.value));
  document.querySelectorAll('.sun').forEach(i=>suH+=parseHours(i.value));

  let remainingTax = 40;

  // Allocate tax hours
  let wTax = Math.min(wH, remainingTax); remainingTax-=wTax;
  let sTax = Math.min(sH, remainingTax); remainingTax-=sTax;
  let suTax = Math.min(suH, remainingTax);

  // Cash hours
  let wCash=wH-wTax;
  let sCash=sH-sTax;
  let suCash=suH-suTax;

  // Pay calculation
  let taxPay=wTax*wt + sTax*st + suTax*sut;
  let cashPay=wCash*wc + sCash*sc + suCash*suc;

  // 15% tax
  let taxDeduct = taxPay*0.15;
  let netTaxPay = taxPay - taxDeduct;

  let total=netTaxPay+cashPay;

  output.innerHTML=`
    <h3>Tax Summary (Max 40h)</h3>
    <p>Weekday: ${wTax.toFixed(2)}h → $${(wTax*wt).toFixed(2)}</p>
    <p>Saturday: ${sTax.toFixed(2)}h → $${(sTax*st).toFixed(2)}</p>
    <p>Sunday: ${suTax.toFixed(2)}h → $${(suTax*sut).toFixed(2)}</p>
    <p><strong>Gross Tax Pay:</strong> $${taxPay.toFixed(2)}</p>
    <p><strong>15% Tax Deduction:</strong> $${taxDeduct.toFixed(2)}</p>
    <p><strong>Net Tax Pay:</strong> $${netTaxPay.toFixed(2)}</p>

    <hr>

    <h3>Cash Summary</h3>
    <p>Weekday: ${wCash.toFixed(2)}h → $${(wCash*wc).toFixed(2)}</p>
    <p>Saturday: ${sCash.toFixed(2)}h → $${(sCash*sc).toFixed(2)}</p>
    <p>Sunday: ${suCash.toFixed(2)}h → $${(suCash*suc).toFixed(2)}</p>
    <p><strong>Total Cash Pay:</strong> $${cashPay.toFixed(2)}</p>

    <hr>

    <h2>Total Pay (Net Tax + Cash): $${total.toFixed(2)}</h2>
  `;
}
</script>

</body>
</html>
